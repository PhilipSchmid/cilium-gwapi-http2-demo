---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway-tls
  namespace: kube-system
spec:
  gatewayClassName: cilium
  listeners:
  - name: tls-passthrough
    protocol: TLS
    port: 8443
    tls:
      mode: Passthrough
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: echo-app-tls
  namespace: echo-app
spec:
  parentRefs:
  - name: cilium-gateway-tls
    namespace: kube-system
  hostnames:
  - "echo-tls.127.0.0.1.sslip.io"
  rules:
  - backendRefs:
    - name: echo-app
      port: 8443
